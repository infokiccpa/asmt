services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - python-api
      - frontend
    restart: always

  backend:
    build: ./backend
    expose:
      - "5000"
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      # Must match nginx upstream (backend Dockerfile defaults to 8080 otherwise)
      - PORT=5000
    restart: always

  python-api:
    build: ./ass
    expose:
      - "8000"
    env_file: ./ass/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        # Same host as browser → empty = axios uses origin; Python via nginx path
        - NEXT_PUBLIC_BACKEND_URL=
        - NEXT_PUBLIC_PYTHON_API_URL=/python-api
        # Must match INTERNAL_API_KEY in ass/.env
        - NEXT_PUBLIC_PYTHON_API_KEY=${PYTHON_INTERNAL_API_KEY}
    expose:
      - "3000"
    restart: always
    depends_on:
      - backend
      - python-api
