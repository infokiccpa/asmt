services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - python-api
      - frontend
    restart: always

  backend:
    build: ./backend
    expose:
      - "5000"
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always

  python-api:
    build: ./ass
    expose:
      - "8000"
    env_file: ./ass/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=
        - NEXT_PUBLIC_PYTHON_API_URL=/python-api
        - NEXT_PUBLIC_PYTHON_API_KEY=f42cbe277bde97b4fb6f44ae3314fddf720925570bf607eb2885fd8d33e95549
    expose:
      - "3000"
    restart: always
    depends_on:
      - backend
      - python-api
